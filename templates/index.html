<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reiseplaner</title>

<style>
    /* Karten Layout */
    #result {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }

    .card {
        background: blue;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 300px;
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    /* Inputs */
    input {
        display: block;
        margin-bottom: 10px;
        padding: 8px;
        width: 300px;
    }

    /* Loading */
    #loading {
        display: none;
        margin-top: 20px;
        text-align: center;
        font-family: Arial;
    }

    .loader {
        width: 100%;
        max-width: 300px;
        height: 8px;
        background: #eee;
        border-radius: 10px;
        overflow: hidden;
        margin: auto;
        position: relative;
    }

    .loader::before {
        content: "";
        position: absolute;
        width: 40%;
        height: 100%;
        background: #4CAF50;
        border-radius: 10px;
        animation: loading 1.2s infinite;
    }

    @keyframes loading {
        0% { left: -40%; }
        50% { left: 30%; }
        100% { left: 100%; }
    }


    .travel-style-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .style-btn {
        padding: 10px 15px;
        border: none;
        background: #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .style-btn:hover {
        background: #bbb;
    }

    .style-btn.active {
        background: #4CAF50;
        color: white;
        font-weight: bold;
    }
    .wasser-btn {
        padding: 10px 15px;
        border: none;
        background: #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .wasser-btn:hover {
        background: #bbb;
    }

    .wasser-btn.active {
        background: #4CAF50;
        color: white;
        font-weight: bold;
    }
    .ferienstil-btn {
        padding: 10px 15px;
        border: none;
        background: #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .ferienstil-btn:hover {
        background: #bbb;
    }

    .ferienstil-btn.active {
        background: #4CAF50;
        color: white;
        font-weight: bold;
    }
    .ferienlage-btn {
        padding: 10px 15px;
        border: none;
        background: #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .ferienlage-btn:hover {
        background: #bbb;
    }

    .ferienlage-btn.active {
        background: #4CAF50;
        color: white;
        font-weight: bold;
    }
    .ferienart-btn {
        padding: 10px 15px;
        border: none;
        background: #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .ferienart-btn:hover {
        background: #bbb;
    }

    .ferienart-btn.active {
        background: #4CAF50;
        color: white;
        font-weight: bold;
    }

</style>

<script>
let reisestyle = "Comfort";

document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll(".style-btn");

    buttons.forEach(button => {
        button.addEventListener("click", function () {
            buttons.forEach(btn => btn.classList.remove("active"));
            this.classList.add("active");
            reisestyle = this.dataset.value;
            console.log("Aktiv:", reisestyle);
        });
    });
});

let am_wasser = "Ja";
document.addEventListener("DOMContentLoaded", function () {
    const wasserButtons = document.querySelectorAll(".wasser-btn");

    wasserButtons.forEach(button => {
        button.addEventListener("click", function () {
            wasserButtons.forEach(btn => btn.classList.remove("active"));
            this.classList.add("active");
            am_wasser = this.dataset.value;
            console.log("Wasser:", am_wasser);
        });
    });
});

let ferienstil = "Aktiv";

document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll(".ferienstil-btn");

    buttons.forEach(button => {
        button.addEventListener("click", function () {

            // alle deaktivieren
            buttons.forEach(btn => btn.classList.remove("active"));

            // aktuellen aktivieren
            this.classList.add("active");

            // Wert speichern
            ferienstil = this.dataset.value;

            console.log("Ferienstil:", ferienstil);
        });
    });
});

let ferienlage = "Stadt";

document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll(".ferienlage-btn");

    buttons.forEach(button => {
        button.addEventListener("click", function () {

            // alle deaktivieren
            buttons.forEach(btn => btn.classList.remove("active"));

            // aktuellen aktivieren
            this.classList.add("active");

            // Wert speichern
            ferienlage = this.dataset.value;

            console.log("Ferienlage:", ferienlage);
        });
    });
});

let ferienart = "Stationaer";

document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll(".ferienart-btn");

    buttons.forEach(button => {
        button.addEventListener("click", function () {

            // alle deaktivieren
            buttons.forEach(btn => btn.classList.remove("active"));

            // aktuellen aktivieren
            this.classList.add("active");

            // Wert speichern
            ferienart = this.dataset.value;

            console.log("Ferienart:", ferienart);
        });
    });
});


</script>


</head>

<body>

<div class="travel-style-bar" id="Ferienlage">

<select name="Ferienart" id="Ferienart">

  <option value="Roadtrip">Roadtrip</option>
</select><br><br>--->

<button id="sendBtn" onclick="askgemini()">Search</button>

<div id="loading">
    <div class="loader"></div>
    <p>Wir erstellen deine Reisevorschläge...</p>
</div>

<div id="result"></div>
<script>

    async function askgemini() {
//Variabeln Zuteilung nach dem einlesen
        const start_datum = document.getElementById('Start_Datum').value;
        const end_datum = document.getElementById('End_Datum').value;
        const budget = document.getElementById('Budget').value;
        const budgettoleranz = document.getElementById('Budgettoleranz').value;
        const mintemperatur = document.getElementById('Mindesttemperatur').value;
        const maxtemperatur = document.getElementById('Maximaltemperatur').value;
        //const temperatur = document.getElementById('Temperatur').value;
        //const am_wasser = document.getElementById('Am_Wasser').value;
        //const reisestyle = document.getElementById('Reisestyle').value;
        //const ferienstil = document.getElementById('Ferienstil').value;
        const ferienfokus = document.getElementById('Fokus').value;
        //const ferienlage = document.getElementById('Ferienlage').value;
        //const ferienart = document.getElementById('Ferienart').value;
        const btn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');

//überprüfen ob wählbare eingaben Getätigt wurden
        if (!start_datum || start_datum.trim()===""){
            console.log ("Ich bin im if")
            alert("Das Start Datum fehlt");
            return;
        }
        if (!end_datum || end_datum.trim()===""){
            console.log ("Ich bin im if")
            alert("Das End Datum fehlt");
            return;
        }
         if (!budget || budget.trim()===""){
            console.log ("Ich bin im if")
            alert("Das Budget fehlt");
            return;
        }
         if (!budgettoleranz || budgettoleranz.trim()==="") {
           console.log("Ich bin im if")
           alert("Die Budgettoleranz fehlt");
           return;
         }
         if (!mintemperatur || mintemperatur.trim()==="") {
           console.log("Ich bin im if")
           alert("Die Mindesttemperatur fehlt");
           return;
         }
         if (!maxtemperatur || maxtemperatur.trim()==="") {
           console.log("Ich bin im if")
           alert("Die Maximaltemperatur fehlt");
           return;
         }


    //Loading anzeigen
    loading.style.display = "block";
    btn.disabled = true;
    btn.innerText = "Bitte warten...";

        // Anfrage an Backend
        try{
        //Anzeige in der Konsole das suche Gestartet wurde
        console.log ("Anfrage gestartet")

        //Effektive abfrage
        const response = await fetch('/request', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                start_datum,
                end_datum,
                budget,
                budgettoleranz,
                mintemperatur,
                maxtemperatur,
                am_wasser,
                reisestyle,
                ferienstil,
                ferienfokus,
                ferienlage,
                ferienart,
            })
        });

        //Auf die anwort warten
        const data = await response.json();

        //Antwort in die Konsole schreiben
        console.log("Server Antwort:", data);

        //Antwort entschlüssel
        const parsedAnswer = JSON.parse(data.answer);

        //Antwort in die Carte weitergeben als liste
        renderCards(parsedAnswer.vorschlaege);

        //Fehler abfangen und in die Konsole schreiben
    } catch (e) {
        console.error("Fehler-Details:", e);
    alert("Fehler beim Request oder beim Verarbeiten der Daten");


        //Loading screen abbrechen und Button wiederfreischalten
    } finally {
        loading.style.display = "none";
        btn.disabled = false;
        btn.innerText = "Search";
    }
}


// Karten anzeigen
function renderCards(vorschlaege) {

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";

    //Karten in einer Vorschleife mit index v anzeigen
    vorschlaege.forEach(v => {
        resultDiv.innerHTML += `
            <div class="card">
                <h3>${v.stadt}, ${v.land}</h3>
                <p>${v.begruendung}</p>
                <p>Kosten: ${v.geschaetzte_kosten_chf} CHF</p>
                <p>Temperatur: ${v.average_temp_month_in_c}°C</p>
                <p>Wasser: ${v.wasser_in_20km_radius ? "Ja" : "Nein"}</p>
                <p>Unterkunft: ${v.unterkunft_art}</p>
                <p>Transport: ${v.transportmittel}</p>
            </div>
        `;
    });
}

</script>

</body>
