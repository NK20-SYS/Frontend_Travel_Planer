<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reiseplaner</title>

<style>
    /* Karten Layout */
    #result {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 300px;
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    /* Inputs */
    input {
        display: block;
        margin-bottom: 10px;
        padding: 8px;
        width: 300px;
    }

    /* Loading */
    #loading {
        display: none;
        margin-top: 20px;
        text-align: center;
        font-family: Arial;
    }

    .loader {
        width: 100%;
        max-width: 300px;
        height: 8px;
        background: #eee;
        border-radius: 10px;
        overflow: hidden;
        margin: auto;
        position: relative;
    }

    .loader::before {
        content: "";
        position: absolute;
        width: 40%;
        height: 100%;
        background: #4CAF50;
        border-radius: 10px;
        animation: loading 1.2s infinite;
    }

    @keyframes loading {
        0% { left: -40%; }
        50% { left: 30%; }
        100% { left: 100%; }
    }
</style>

</head>

<body>

<h1>Reiseplaner</h1>

<input id="Start_Datum" placeholder="Start Datum">
<input id="End_Datum" placeholder="End Datum">
<input id="Budget" placeholder="Budget CHF">
<input id="Temperatur" placeholder="Temperatur">
<input id="Am_Wasser" placeholder="Am Wasser? (ja/nein)">
<input id="Reisestyle" placeholder="Reisestil">

<button id="btn" onclick="askgemini()">Search</button>

<!-- Loading -->
<div id="loading">
    <div class="loader"></div>
    <p>AI erstellt deine Reisevorschläge...</p>
</div>

<div id="result"></div>

<script>

async function askgemini() {

    const budget = document.getElementById('Budget').value;
    const start_datum = document.getElementById('Start_Datum').value;
    const end_datum = document.getElementById('End_Datum').value;
    const temperatur = document.getElementById('Temperatur').value;
    const am_wasser = document.getElementById('Am_Wasser').value;
    const reisestyle = document.getElementById('Reisestyle').value;

    const resultDiv = document.getElementById('result');
    const loading = document.getElementById('loading');
    const btn = document.getElementById('btn');

    // 🔥 NEU: alte Karten sofort entfernen
    resultDiv.innerHTML = "";

    // Validation
    if (
        !budget.trim() ||
        !start_datum.trim() ||
        !end_datum.trim() ||
        !temperatur.trim() ||
        !am_wasser.trim() ||
        !reisestyle.trim()
    ) {
        alert("Bitte alle Felder ausfüllen!");
        return;
    }

    // Loading anzeigen
    loading.style.display = "block";
    btn.disabled = true;
    btn.innerText = "Bitte warten...";

    try {
        const response = await fetch('/request', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                budget,
                start_datum,
                end_datum,
                temperatur,
                am_wasser,
                reisestyle
            })
        });

        const data = await response.json();

        renderCards(data.vorschlaege);

    } catch (e) {
        console.error(e);
        alert("Fehler beim Request");

    } finally {
        loading.style.display = "none";
        btn.disabled = false;
        btn.innerText = "Search";
    }
}


// Karten anzeigen
function renderCards(vorschlaege) {

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "";

    vorschlaege.forEach(v => {
        resultDiv.innerHTML += `
            <div class="card">
                <h3>${v.stadt}, ${v.land}</h3>
                <p>${v.begruendung}</p>
                <p>Kosten: ${v.geschaetzte_kosten_chf} CHF</p>
                <p>Temperatur: ${v.average_temp_month_in_c}°C</p>
                <p>Wasser: ${v.wasser_in_20km_radius ? "Ja" : "Nein"}</p>
                <p>Unterkunft: ${v.unterkunft_art}</p>
                <p>Transport: ${v.transportmittel}</p>
            </div>
        `;
    });
}

</script>

</body>
</html>
